# ═══════════════════════════════════════════════════════════════════════════════
# Sentinel AI VMS — nginx Reverse Proxy / API Gateway
#
# Features:
#   • TLS 1.2/1.3 with HSTS
#   • WebSocket proxy for camera streams
#   • Rate limiting per IP
#   • Security headers
#   • Prometheus /metrics blocked from public internet
#   • Gzip compression
#   • Upstream health checks
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens   off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf font/opentype
               image/svg+xml image/x-icon;

    # Client body size (for base64 image uploads in biometrics)
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=global:10m rate=100r/s;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=api_ai:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream: VMS application instances
    upstream sentinel_vms {
        least_conn;
        server app:5000 max_fails=3 fail_timeout=30s;
        # Add more app instances here for production:
        # server app2:5000 max_fails=3 fail_timeout=30s;
        # server app3:5000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name vms.example.com;

        # TLS configuration
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=*,microphone=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: https:; worker-src blob:;" always;

        # Rate limiting
        limit_req  zone=global burst=200 nodelay;
        limit_conn conn_limit 100;

        # Block /metrics from public internet
        location = /metrics {
            deny all;
            return 403;
        }

        # Block internal health probes from public (use /api/health instead)
        location ~ ^/health/(ready|status)$ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://sentinel_vms;
        }

        # Auth endpoints — extra rate limiting
        location ~ ^/api/auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://sentinel_vms;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # AI endpoints — rate limiting
        location ~ ^/api/ai/ {
            limit_req zone=api_ai burst=60 nodelay;
            proxy_pass http://sentinel_vms;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # WebSocket upgrade for camera streams
        location /ws {
            proxy_pass http://sentinel_vms;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # All other routes
        location / {
            proxy_pass http://sentinel_vms;
            include /etc/nginx/conf.d/proxy_params.conf;
        }
    }
}
