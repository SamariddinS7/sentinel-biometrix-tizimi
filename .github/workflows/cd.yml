name: CD — Deploy to Kubernetes

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
      image_tag:
        description: Image tag to deploy (defaults to latest main SHA)
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: "3.16.0"

jobs:
  # ── Deploy to staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-vms.example.com
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Helm upgrade (staging)
        run: |
          helm upgrade --install sentinel-vms ./helm/sentinel-vms \
            --namespace sentinel-vms \
            --create-namespace \
            --values helm/sentinel-vms/values.yaml \
            --values helm/sentinel-vms/values.staging.yaml \
            --set image.tag=sha-$(git rev-parse --short HEAD) \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --wait \
            --timeout 5m \
            --atomic

      - name: Smoke test staging
        run: |
          kubectl rollout status deployment/sentinel-vms -n sentinel-vms --timeout=5m
          ENDPOINT=$(kubectl get ingress sentinel-vms -n sentinel-vms -o jsonpath='{.spec.rules[0].host}')
          curl -sf https://${ENDPOINT}/health/ready || exit 1
          echo "Staging smoke test passed ✓"

  # ── Deploy to production (tag-gated) ───────────────────────────────────────
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: https://vms.example.com
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure kubectl (production)
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Helm upgrade (production — blue-green)
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag || github.ref_name }}
          helm upgrade --install sentinel-vms ./helm/sentinel-vms \
            --namespace sentinel-vms \
            --create-namespace \
            --values helm/sentinel-vms/values.yaml \
            --values helm/sentinel-vms/values.prod.yaml \
            --set image.tag=${IMAGE_TAG} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --wait \
            --timeout 10m \
            --atomic

      - name: Production health verification
        run: |
          kubectl rollout status deployment/sentinel-vms -n sentinel-vms --timeout=10m
          sleep 10
          curl -sf https://vms.example.com/health/status | jq '.status == "ok"' | grep true
          echo "Production deployment verified ✓"

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"🚨 PRODUCTION DEPLOY FAILED: ${{ github.ref_name }} — check GitHub Actions"}'
