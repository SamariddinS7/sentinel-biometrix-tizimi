global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: sentinel-vms
    environment: production

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── VMS Application ────────────────────────────────────────────────────────
  - job_name: sentinel-vms
    static_configs:
      - targets: ['app:9090']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── PostgreSQL (postgres_exporter) ─────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis (redis_exporter) ─────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── NATS monitoring endpoint ───────────────────────────────────────────────
  - job_name: nats
    static_configs:
      - targets: ['nats:8222']
    metrics_path: /metrics

  # ── MinIO ──────────────────────────────────────────────────────────────────
  - job_name: minio
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster
    scheme: http

  # ── Node exporter (host metrics) ──────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
