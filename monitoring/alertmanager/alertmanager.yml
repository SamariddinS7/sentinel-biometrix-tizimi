global:
  # How long to wait before sending a notification about new alerts
  resolve_timeout: 5m
  # Default SMTP settings (override with secrets)
  smtp_from: 'sentinel-vms-alerts@example.com'
  smtp_smarthost: 'smtp.example.com:587'
  smtp_require_tls: true

# ── Inhibition rules ────────────────────────────────────────────────────────
inhibit_rules:
  # Suppress warning alerts when a critical alert fires for the same instance
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, instance]

  # Suppress all alerts except "VMSInstanceDown" when the whole app is down
  - source_matchers:
      - alertname = VMSInstanceDown
    target_matchers:
      - job = sentinel-vms
    equal: [instance]

# ── Routing tree ────────────────────────────────────────────────────────────
route:
  group_by: [alertname, severity, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts → page immediately (short repeat)
    - matchers:
        - severity = critical
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 30m
      continue: true

    # Security / camera alerts → security ops team
    - matchers:
        - team = security
      receiver: 'slack-security'
      repeat_interval: 1h

    # Platform infra alerts → platform team
    - matchers:
        - team = platform
      receiver: 'slack-platform'
      repeat_interval: 2h

    # AI inference degradation → ML team
    - matchers:
        - alertname =~ "VMSAIInference.*"
      receiver: 'slack-ml'
      repeat_interval: 1h

    # Maintenance window: silence all non-critical during planned windows
    # (managed via Alertmanager /api/v2/silences endpoint)

# ── Receivers ───────────────────────────────────────────────────────────────
receivers:
  - name: 'default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#sentinel-alerts'
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Runbook:* {{ .Annotations.runbook }}
          {{ end }}
        send_resolved: true

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_INTEGRATION_KEY}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          description: '{{ .CommonAnnotations.description }}'
          runbook: '{{ .CommonAnnotations.runbook }}'
        client: 'Sentinel VMS Alertmanager'
        severity: critical

  - name: 'slack-security'
    slack_configs:
      - api_url: '${SLACK_SECURITY_WEBHOOK_URL}'
        channel: '#security-ops'
        title: '🚨 Security Alert: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook }}
          {{ end }}
        send_resolved: true

  - name: 'slack-platform'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#platform-alerts'
        title: '⚠️ Platform: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
        send_resolved: true

  - name: 'slack-ml'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#ml-ops'
        title: '🤖 AI Inference: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}{{ .Annotations.summary }}: {{ .Annotations.description }}{{ end }}
        send_resolved: true
