apiVersion: v2
name: sentinel-vms
description: Sentinel AI Video Management System — Enterprise Production Helm Chart
type: application
version: 3.0.4
appVersion: "3.0.4"
kubeVersion: ">=1.28.0"
home: https://github.com/org/sentinel-vms
keywords:
  - vms
  - security
  - ai
  - biometrics
  - surveillance
maintainers:
  - name: Sentinel Systems
    email: devops@sentinel.sys
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nats
    version: "1.x.x"
    repository: "https://nats-io.github.io/k8s/helm/charts"
    condition: nats.enabled
  - name: minio
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
