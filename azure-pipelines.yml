# ═══════════════════════════════════════════════════════════════════════════════
# Sentinel AI VMS — Azure DevOps Pipeline
# ═══════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include: [main, release/*]
  paths:
    exclude: ["*.md", "docs/**"]

pr:
  branches:
    include: [main]

variables:
  NODE_VERSION: "20.x"
  IMAGE_REPOSITORY: "sentinelvms.azurecr.io/sentinel-vms"
  HELM_CHART: "./helm/sentinel-vms"

stages:

# ── Validate & Test ──────────────────────────────────────────────────────────
- stage: ValidateTest
  displayName: "Validate & Test"
  jobs:

  - job: Lint
    displayName: "Lint & Type-check"
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
    - script: npm ci
      displayName: Install dependencies
    - script: npm run lint
      displayName: TypeScript + ESLint

  - job: Test
    displayName: "Unit & Integration Tests"
    pool:
      vmImage: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel_vms_test
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
    variables:
      POSTGRES_URL: "postgres://sentinel:test_password@localhost:5432/sentinel_vms_test"
      REDIS_URL: "redis://localhost:6379"
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
    - script: npm ci
      displayName: Install dependencies
    - script: npm test -- --coverage --reporter=junit --outputFile=$(Agent.TempDirectory)/test-results.xml
      displayName: Run test suite
    - task: PublishTestResults@2
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: $(Agent.TempDirectory)/test-results.xml
    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: coverage/cobertura-coverage.xml

  - job: HelmLint
    displayName: "Helm Lint"
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: HelmInstaller@1
      inputs:
        helmVersionToInstall: "3.14.0"
    - script: |
        helm lint $(HELM_CHART) -f $(HELM_CHART)/values.yaml -f $(HELM_CHART)/values.staging.yaml
        helm lint $(HELM_CHART) -f $(HELM_CHART)/values.yaml -f $(HELM_CHART)/values.prod.yaml
      displayName: Lint Helm chart

# ── Security Scan ────────────────────────────────────────────────────────────
- stage: Security
  displayName: "Security Scans"
  dependsOn: ValidateTest
  jobs:

  - job: DependencyAudit
    displayName: "npm audit"
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
    - script: npm ci && npm audit --audit-level=high
      displayName: Dependency vulnerability audit

  - job: SecretScan
    displayName: "TruffleHog Secret Scan"
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: |
        docker pull trufflesecurity/trufflehog:latest
        docker run --rm \
          -v "$(Build.SourcesDirectory):/workdir" \
          trufflesecurity/trufflehog git file:///workdir --since-commit HEAD~1 --fail
      displayName: Scan for secrets

# ── Build ────────────────────────────────────────────────────────────────────
- stage: Build
  displayName: "Build & Push Container"
  dependsOn: Security
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: BuildPush
    displayName: "Docker Build & Push"
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build and push
      inputs:
        containerRegistry: sentinelvms-acr
        repository: sentinel-vms
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(Build.SourceVersion)
          latest
        arguments: --build-arg BUILDKIT_INLINE_CACHE=1

    - task: AquaSecurityTrivy@1
      displayName: Trivy container scan
      inputs:
        image: "$(IMAGE_REPOSITORY):$(Build.SourceVersion)"
        exitCode: 1
        severities: HIGH,CRITICAL

# ── Deploy Staging ───────────────────────────────────────────────────────────
- stage: DeployStaging
  displayName: "Deploy to Staging"
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - deployment: Staging
    displayName: "Helm deploy → staging"
    environment: staging
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: "3.14.0"
          - task: HelmDeploy@0
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceConnection: sentinel-aks-staging
              namespace: sentinel-staging
              command: upgrade
              chartType: FilePath
              chartPath: $(HELM_CHART)
              releaseName: sentinel-vms
              valueFile: "$(HELM_CHART)/values.yaml,$(HELM_CHART)/values.staging.yaml"
              overrideValues: "image.tag=$(Build.SourceVersion)"
              waitForExecution: true
              arguments: "--create-namespace --timeout 10m"

  - job: SmokeTest
    displayName: "Smoke tests"
    dependsOn: Staging
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: |
        for i in $(seq 1 15); do
          curl -sf https://vms-staging.example.com/health/live && break
          sleep 10
        done
        curl -sf https://vms-staging.example.com/health/ready
        echo "Smoke tests passed"
      displayName: Health check smoke tests

# ── Deploy Production ────────────────────────────────────────────────────────
- stage: DeployProduction
  displayName: "Deploy to Production"
  dependsOn: DeployStaging
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - deployment: Production
    displayName: "Helm deploy → production"
    environment: production
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: "3.14.0"
          - task: HelmDeploy@0
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceConnection: sentinel-aks-production
              namespace: sentinel-production
              command: upgrade
              chartType: FilePath
              chartPath: $(HELM_CHART)
              releaseName: sentinel-vms
              valueFile: "$(HELM_CHART)/values.yaml,$(HELM_CHART)/values.prod.yaml"
              overrideValues: "image.tag=$(Build.SourceVersion)"
              waitForExecution: true
              arguments: "--atomic --timeout 15m"
