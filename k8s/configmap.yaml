apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-vms-config
  namespace: sentinel-vms
  labels:
    app: sentinel-vms
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "5000"
  METRICS_PORT: "9090"
  STORAGE_REGION: "us-east-1"
  STORAGE_FORCE_PATH_STYLE: "true"
  POSTGRES_POOL_MAX: "20"
  POSTGRES_SSL: "true"
  NATS_REPLICAS: "3"
  TZ: "UTC"
